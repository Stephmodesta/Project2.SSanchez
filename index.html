<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Steph’s Mortgage Planner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>
      <h1>Steph’s Mortgage Planner</h1>
      <p class="subtitle">
        A simple tool to estimate your monthly mortgage payment before making
        big financial decisions.
      </p>
    </header>

    <main class="container">
      <div class="image-section">
        <img
          src="https://images.unsplash.com/photo-1560518883-ce09059eeffa"
          alt="House Image"
        />
      </div>

      <div class="form-section">
        <label>Loan Amount ($):</label>
        <input type="number" id="principal" placeholder="e.g. 225000" />

        <label>Interest Rate (%):</label>
        <input type="number" id="rate" placeholder="e.g. 7.25" />

        <label>Loan Term:</label>
        <select id="years">
          <option value="10">10 Years</option>
          <option value="15">15 Years</option>
          <option value="30">30 Years</option>
        </select>

        <button onclick="calculateMortgage()">Calculate</button>

        <h2 id="result"></h2>
      </div>
    </main>

    <footer>
      <p>
        Built by Steph | View project on
        <a href="https://github.com/YOUR_USERNAME/YOUR_REPO" target="_blank">
          GitHub
        </a>
      </p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
